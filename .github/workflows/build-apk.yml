name: Build & Release APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

env:
  ANDROID_HOME: /usr/local/lib/android/sdk
  ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

jobs:
  build-apk:
    name: Build soccer-clashers.apk
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ─────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Java ─────────────────────────────────────────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      # ── Node.js ──────────────────────────────────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      # ── Android SDK – accept licenses & install required components ───────────
      - name: Configure Android SDK
        run: |
          # Find sdkmanager regardless of cmdline-tools version (latest / 12.0 / etc.)
          SDKMANAGER=$(find "$ANDROID_HOME/cmdline-tools" -name "sdkmanager" -type f 2>/dev/null | head -1)
          echo "sdkmanager: $SDKMANAGER"
          if [ -n "$SDKMANAGER" ]; then
            yes | "$SDKMANAGER" --licenses > /dev/null 2>&1 || true
            "$SDKMANAGER" "platform-tools" "platforms;android-34" "build-tools;34.0.0" || true
          else
            echo "sdkmanager not found, relying on pre-installed components"
          fi
          echo "Installed SDK packages:"
          ls "$ANDROID_HOME/platforms/" 2>/dev/null || true
          ls "$ANDROID_HOME/build-tools/" 2>/dev/null || true

      # ── npm install ───────────────────────────────────────────────────────────
      - name: Install Node dependencies
        run: npm ci

      # ── Build web assets ──────────────────────────────────────────────────────
      - name: Build web assets
        run: npm run build

      # ── Capacitor: add & sync Android ─────────────────────────────────────────
      - name: Add Capacitor Android platform
        run: npx cap add android
        env:
          CI: true

      - name: Sync Capacitor
        run: npx cap sync android
        env:
          CI: true

      # ── Gradle build ──────────────────────────────────────────────────────────
      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Debug APK
        working-directory: android
        run: |
          ./gradlew assembleDebug \
            --no-daemon \
            --stacktrace \
            -Dorg.gradle.jvmargs="-Xmx2g -XX:MaxMetaspaceSize=512m"

      # ── Collect APK ───────────────────────────────────────────────────────────
      - name: Locate and rename APK
        run: |
          APK=$(find android/app/build/outputs/apk -name "*.apk" | head -1)
          echo "APK found: $APK"
          cp "$APK" soccer-clashers.apk
          ls -lh soccer-clashers.apk

      # ── GitHub Release ────────────────────────────────────────────────────────
      - name: Create Release & upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: Soccer Clasher v1.0.${{ github.run_number }}
          body: |
            ## ⚽ Soccer Clasher v1.0.${{ github.run_number }}

            ### 📲 Installation Android
            1. Téléchargez **soccer-clashers.apk** ci-dessous
            2. *Paramètres → Sécurité → Sources inconnues* → Activé
            3. Ouvrez l'APK pour installer

            ### Contenu Phase 1
            - PSG vs OM · 11 joueurs réels par équipe (saison 2024-25)
            - Système de cartes Clash Royale · énergie rechargeable
            - Drapeau de corner (1 000 PV) → But (2 000 PV)
            - 6 capacités : Rapide · Tank · Zone · Buteur · Boost · Équilibré
            - IA adversaire automatique
          files: soccer-clashers.apk
          draft: false
          prerelease: false
