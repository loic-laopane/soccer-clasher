name: Build & Release APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    name: Build soccer-clashers.apk
    runs-on: ubuntu-latest

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Java (required by Gradle) ────────────────────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      # ── Node.js ─────────────────────────────────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      # ── Android SDK ──────────────────────────────────────────────────────────
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK platform 34 + build-tools
        run: |
          sdkmanager --install "platform-tools" "platforms;android-34" "build-tools;34.0.0"
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      # ── npm install ──────────────────────────────────────────────────────────
      - name: Install Node dependencies
        run: npm ci

      # ── Build web assets (copies src/ + index.html → www/) ─────────────────
      - name: Build web assets
        run: npm run build

      # ── Capacitor: add Android platform ────────────────────────────────────
      - name: Add Capacitor Android platform
        run: npx cap add android
        env:
          CI: true

      # ── Capacitor: sync web assets into android project ─────────────────────
      - name: Sync Capacitor
        run: npx cap sync android
        env:
          CI: true

      # ── Grant execute permission to Gradle wrapper ──────────────────────────
      - name: Make gradlew executable
        run: chmod +x android/gradlew

      # ── Build debug APK ─────────────────────────────────────────────────────
      - name: Build Debug APK
        working-directory: android
        run: |
          ./gradlew assembleDebug \
            --no-daemon \
            --stacktrace \
            -Dorg.gradle.jvmargs="-Xmx2g -XX:MaxMetaspaceSize=512m"

      # ── Locate & rename APK ─────────────────────────────────────────────────
      - name: Locate and rename APK
        run: |
          APK_PATH=$(find android/app/build/outputs/apk -name "*.apk" | head -1)
          echo "Found APK at: $APK_PATH"
          cp "$APK_PATH" soccer-clashers.apk
          ls -lh soccer-clashers.apk

      # ── Determine version tag ───────────────────────────────────────────────
      - name: Compute version tag
        id: version
        run: echo "tag=v1.0.${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      # ── Create GitHub Release and upload APK ────────────────────────────────
      - name: Create Release & upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Soccer Clasher ${{ steps.version.outputs.tag }}
          body: |
            ## ⚽ Soccer Clasher ${{ steps.version.outputs.tag }}

            Build automatique déclenché par le merge sur `main`.

            ### 📲 Installation Android
            1. Téléchargez **soccer-clashers.apk** ci-dessous
            2. Sur votre appareil : *Paramètres → Sécurité → Sources inconnues* → Activé
            3. Ouvrez le fichier APK pour installer

            ### 🆕 Contenu Phase 1
            - Terrain de football vue du dessus (portrait)
            - 2 équipes : **PSG** et **OM** (11 joueurs réels, saison 2024-25)
            - Système de cartes façon Clash Royale (4 en main, énergie rechargeable)
            - Structures : Drapeau de corner (1000 PV) + But (2000 PV)
            - 6 capacités spéciales : Rapide, Tank, Frappe puissante, Zone, Buteur, Boost énergie
            - IA adversaire avec déploiement automatique
          files: soccer-clashers.apk
          draft: false
          prerelease: false
