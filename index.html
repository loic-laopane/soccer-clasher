<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>Soccer Clasher</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      touch-action: none;
    }
    canvas { display: block; }
  </style>
</head>
<body>
  <!-- Phaser 3 -->
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.min.js"></script>

  <!-- Game config & data -->
  <script src="src/config.js"></script>
  <script src="src/data/teams.js"></script>

  <!-- Entities -->
  <script src="src/entities/Structure.js"></script>
  <script src="src/entities/Unit.js"></script>
  <script src="src/entities/Goalkeeper.js"></script>

  <!-- Scenes -->
  <script src="src/scenes/BootScene.js"></script>
  <script src="src/scenes/MenuScene.js"></script>
  <script src="src/scenes/TeamSelectScene.js"></script>
  <script src="src/scenes/GameScene.js"></script>
  <script src="src/scenes/GameOverScene.js"></script>

  <!-- Bootstrap -->
  <script src="src/main.js"></script>
</body>
</html>
